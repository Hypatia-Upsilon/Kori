name: Build Compose Multiplatform App

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '选择要构建的平台 (Select platform to build)'
        required: true
        default: 'android'
        type: choice
        options:
          - all
          - android
          - windows
          - macos
          - linux
      android_package_name:
        description: 'Android 包名 / applicationId (留空则默认同 macOS 选项)'
        required: false
        default: ''
        type: string
      macos_bundle_id:
        description: 'macOS BundleID / bundleID (留空则默认同 Android 选项)'
        required: false
        default: ''
        type: string

jobs:
  # ================= Android 构建任务 =================
  build-android:
    name: Build Android
    if: github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      # 动态且临时替换包名及 FileProvider 授权标识（含回退逻辑）
      - name: Customize Android Package Name
        shell: python
        env:
          ANDROID_PACKAGE_NAME: ${{ github.event.inputs.android_package_name }}
          MACOS_BUNDLE_ID: ${{ github.event.inputs.macos_bundle_id }}
        run: |
          import os
          android_input = os.getenv("ANDROID_PACKAGE_NAME", "").strip()
          macos_input = os.getenv("MACOS_BUNDLE_ID", "").strip()
          
          # 回退逻辑：只填一个就统一用一个，都填了就分别应用
          target_android = None
          if android_input and macos_input:
              target_android = android_input
          elif android_input:
              target_android = android_input
          elif macos_input:
              target_android = macos_input
              
          if target_android and target_android != "org.yangdai.kori":
              # 1. 优先定位并修改 build.gradle.kts 中的 applicationId
              file_path = "composeApp/build.gradle.kts"
              if not os.path.exists(file_path):
                  for root, dirs, files in os.walk("."):
                      if "build.gradle.kts" in files:
                          temp_path = os.path.join(root, "build.gradle.kts")
                          try:
                              with open(temp_path, "r", encoding="utf-8") as f:
                                  content = f.read()
                              if 'applicationId = "org.yangdai.kori"' in content:
                                  file_path = temp_path
                                  break
                          except Exception:
                              pass
              
              if os.path.exists(file_path):
                  print(f"Modifying applicationId in {file_path} to {target_android}")
                  try:
                      with open(file_path, "r", encoding="utf-8") as f:
                          content = f.read()
                      content = content.replace('applicationId = "org.yangdai.kori"', f'applicationId = "{target_android}"')
                      with open(file_path, "w", encoding="utf-8") as f:
                          f.write(content)
                  except Exception as e:
                      print(f"Error modifying build.gradle.kts: {e}")
              
              # 2. 定位并修改 AndroidManifest.xml 中的 FileProvider authorities
              manifest_path = "composeApp/src/androidMain/AndroidManifest.xml"
              if not os.path.exists(manifest_path):
                  for root, dirs, files in os.walk("."):
                      if "AndroidManifest.xml" in files:
                          manifest_path = os.path.join(root, "AndroidManifest.xml")
                          break
              
              if os.path.exists(manifest_path):
                  print(f"Modifying FileProvider authorities in {manifest_path} to {target_android}.fileprovider")
                  try:
                      with open(manifest_path, "r", encoding="utf-8") as f:
                          manifest_content = f.read()
                      # 替换默认的 FileProvider authority
                      old_authority = 'android:authorities="org.yangdai.kori.fileprovider"'
                      new_authority = f'android:authorities="{target_android}.fileprovider"'
                      manifest_content = manifest_content.replace(old_authority, new_authority)
                      with open(manifest_path, "w", encoding="utf-8") as f:
                          f.write(manifest_content)
                  except Exception as e:
                      print(f"Error modifying AndroidManifest.xml: {e}")
              else:
                  print("Warning: Could not find AndroidManifest.xml to update FileProvider authorities.")

      - name: Build Release APK
        run: ./gradlew :composeApp:assembleRelease

      # 使用 Base64 Secrets 生成签名 keystore 文件
      - name: Decrypt Android Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > release.keystore

      # 签名并验证所有生成的 APK 文件
      - name: Sign APKs
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | sort -V | tail -n1)
          echo "Using apksigner at: $APKSIGNER"
          
          find composeApp/build/outputs/apk/release -name "*.apk" | while read -r APK_FILE; do
              echo "=============================================="
              echo "Signing file: $APK_FILE"
              $APKSIGNER sign --ks release.keystore \
                              --ks-pass pass:"$KEYSTORE_PASSWORD" \
                              --ks-key-alias "$KEY_ALIAS" \
                              --key-pass pass:"$KEY_PASSWORD" \
                              "$APK_FILE"
              
              echo "Verifying signature of: $APK_FILE"
              $APKSIGNER verify --verbose "$APK_FILE"
          done
          echo "=============================================="
          echo "All APK packages have been successfully signed."

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kori-Android-APK
          path: composeApp/build/outputs/apk/release/*.apk


  # ================= Windows 构建任务 =================
  build-windows:
    name: Build Windows
    if: github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows'
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Windows MSI
        run: ./gradlew packageMsi

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kori-Windows-MSI
          path: "**/build/compose/binaries/main/msi/*.msi"


  # ================= macOS 构建任务 =================
  build-macos:
    name: Build macOS
    if: github.event.inputs.platform == 'all' || github.event.inputs.platform == 'macos'
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      # 动态且临时替换包名（含回退逻辑）
      - name: Customize macOS Bundle ID
        shell: python
        env:
          ANDROID_PACKAGE_NAME: ${{ github.event.inputs.android_package_name }}
          MACOS_BUNDLE_ID: ${{ github.event.inputs.macos_bundle_id }}
        run: |
          import os
          android_input = os.getenv("ANDROID_PACKAGE_NAME", "").strip()
          macos_input = os.getenv("MACOS_BUNDLE_ID", "").strip()
          
          # 回退逻辑：只填一个就统一用一个，都填了就分别应用
          target_macos = None
          if android_input and macos_input:
              target_macos = macos_input
          elif android_input:
              target_macos = android_input
          elif macos_input:
              target_macos = macos_input
              
          if target_macos and target_macos != "org.yangdai.kori":
              file_path = "composeApp/build.gradle.kts"
              
              if not os.path.exists(file_path):
                  for root, dirs, files in os.walk("."):
                      if "build.gradle.kts" in files:
                          temp_path = os.path.join(root, "build.gradle.kts")
                          try:
                              with open(temp_path, "r", encoding="utf-8") as f:
                                  content = f.read()
                              if 'bundleID = "org.yangdai.kori"' in content:
                                  file_path = temp_path
                                  break
                          except Exception:
                              pass
              
              if os.path.exists(file_path):
                  print(f"Modifying bundleID in {file_path} to {target_macos}")
                  try:
                      with open(file_path, "r", encoding="utf-8") as f:
                          content = f.read()
                      content = content.replace('bundleID = "org.yangdai.kori"', f'bundleID = "{target_macos}"')
                      with open(file_path, "w", encoding="utf-8") as f:
                          f.write(content)
                  except Exception as e:
                      print(f"Error modifying file: {e}")

      - name: Build macOS DMG & PKG
        run: ./gradlew packageDmg packagePkg

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kori-macOS-Packages
          path: |
            **/build/compose/binaries/main/dmg/*.dmg
            **/build/compose/binaries/main/pkg/*.pkg


  # ================= Linux 构建任务 =================
  build-linux:
    name: Build Linux
    if: github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Install Packaging Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot

      - name: Build Linux DEB & RPM
        run: ./gradlew packageDeb packageRpm

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kori-Linux-Packages
          path: |
            **/build/compose/binaries/main/deb/*.deb
            **/build/compose/binaries/main/rpm/*.rpm
